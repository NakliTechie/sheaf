# CI — the same deterministic gate a release runs locally: the 8 test suites,
# then a build that must reproduce the committed single-file index.html exactly
# (the build is deterministic; drift means someone edited src/ without rebuilding,
# or the build stopped being reproducible — both are failures).
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Test (8 suites, no deps to install)
        run: npm test
      - name: Build reproduces the committed index.html
        run: |
          node build/inline.mjs
          git diff --exit-code -- index.html _headers
