<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sheaf — PDF editor</title>
  <meta name="description" content="Browser-native PDF editor. One file. No account, no upload, no telemetry, no limits.">
  <meta name="sheaf-version" content="0.2.0">
  <!-- connect-src allows the AI sidecar to reach the user's OWN provider (BYOK, any
       https endpoint they configure) and a local Ollama/LM Studio bridge. With no AI
       configured nothing connects anywhere; with a local model nothing leaves the
       machine. There is no first-party backend to talk to. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self' blob:; connect-src 'self' https: http://localhost:* http://127.0.0.1:*; object-src 'none'; base-uri 'self'">
  <style>
/* ui/theme.css */
/* theme.css — design tokens (nakli-creative-primitives convention). Every colour,
   space, and radius is a custom property; a new theme is one [data-theme] block,
   never a refactor. Dark is the default (high-contrast a11y per handoff §11). */

:root,
:root[data-theme="dark"] {
  --bg:            #14161a;
  --bg-raised:     #1c1f25;
  --bg-sunken:     #0f1114;
  --panel:         #1c1f25;
  --panel-border:  #2b2f37;
  --canvas-bg:     #0b0c0f;

  --fg:            #e7e9ee;
  --fg-muted:      #9aa1ad;
  --fg-faint:      #6b7280;

  --accent:        #5b8cff;
  --accent-fg:     #ffffff;
  --accent-soft:   #21304f;

  --danger:        #ff5c5c;
  --danger-soft:   #3a1f22;
  --warn:          #ffb454;
  --ok:            #4ec98f;

  --page-shadow:   0 2px 14px rgba(0,0,0,.55);
  --overlay:       rgba(8,9,11,.66);

  --r-sm: 5px;  --r-md: 9px;  --r-lg: 14px;
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;  --sp-5: 24px;  --sp-6: 36px;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

  --toolbar-h: 52px;
  --rail-w: 168px;
  --shadow-pop: 0 10px 40px rgba(0,0,0,.5);
}

:root[data-theme="light"] {
  --bg:            #f4f5f7;
  --bg-raised:     #ffffff;
  --bg-sunken:     #e9ebef;
  --panel:         #ffffff;
  --panel-border:  #d9dce2;
  --canvas-bg:     #cfd3da;

  --fg:            #1a1d23;
  --fg-muted:      #5b626d;
  --fg-faint:      #8b919c;

  --accent:        #2f6bff;
  --accent-fg:     #ffffff;
  --accent-soft:   #dbe6ff;

  --danger:        #d23b3b;
  --danger-soft:   #fbe3e3;
  --warn:          #b9760f;
  --ok:            #1f9d62;

  --page-shadow:   0 2px 12px rgba(20,30,50,.18);
  --overlay:       rgba(20,24,32,.4);
}

* { box-sizing: border-box; }

html, body {
  margin: 0; height: 100%;
  background: var(--bg); color: var(--fg);
  font-family: var(--font); font-size: 14px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

button { font-family: inherit; font-size: inherit; color: inherit; }

.visually-hidden {
  position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }


/* ui/layout.css */
/* layout.css — the shell: toolbar, thumbnail rail, scrolling page viewport, status
   bar, toasts, modals. Dim-never-hide for the canvas/thumb layouts (handoff §8). */

#app { display: flex; flex-direction: column; height: 100%; }

/* ── Toolbar ─────────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h); flex: 0 0 auto;
  display: flex; align-items: center; gap: var(--sp-2);
  padding: 0 var(--sp-3);
  background: var(--bg-raised); border-bottom: 1px solid var(--panel-border);
  user-select: none;
  /* Never let the toolbar's intrinsic width push #app wider than the viewport:
     min-width:0 lets the flex item shrink to the column width, overflow:hidden clips
     any transient spill. Reachability is handled in JS — toolbar.js folds the
     lower-priority page ops into a "More" menu (#btn-more) before they'd be clipped,
     so #app never scrolls horizontally and the rail + right group stay in frame. */
  min-width: 0; overflow: hidden;
}
#toolbar .brand { display: flex; align-items: baseline; gap: 6px; margin-right: var(--sp-3); }
#toolbar .brand b { font-size: 16px; letter-spacing: .3px; }
#toolbar .brand .ver { font-size: 11px; color: var(--fg-faint); }
#toolbar .group { display: flex; align-items: center; gap: 4px; }
#toolbar .sep { width: 1px; height: 24px; background: var(--panel-border); margin: 0 var(--sp-1); }
#toolbar .spacer { flex: 1; min-width: 0; }
#toolbar .fname { color: var(--fg-muted); font-size: 12px; min-width: 0; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#toolbar .fname .dot { color: var(--warn); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 10px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid transparent; color: var(--fg);
  cursor: pointer; white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--bg-sunken); }
.btn:disabled { opacity: .38; cursor: default; }
.btn.primary { background: var(--accent); color: var(--accent-fg); }
.btn.primary:hover:not(:disabled) { filter: brightness(1.08); }
.btn.icon { padding: 0; width: 34px; justify-content: center; }
.btn.danger:hover:not(:disabled) { background: var(--danger-soft); color: var(--danger); }
.btn svg { width: 18px; height: 18px; display: block; }
.btn .label { font-size: 13px; }
.btn.tool.active { background: var(--accent); color: var(--accent-fg); }
.color-swatch { width: 28px; height: 28px; padding: 0; border: 1px solid var(--panel-border); border-radius: var(--r-sm); background: none; cursor: pointer; }

/* Overflow "More" menu — the page ops folded out of the toolbar, as a vertical list. */
.menu-list { display: flex; flex-direction: column; gap: 4px; min-width: 240px; }
.menu-list .menu-item { justify-content: flex-start; width: 100%; height: 40px; padding: 0 12px; gap: 10px; }
.menu-list .menu-item .label { font-size: 14px; }

/* Annotation drawing: crosshair over pages, live preview overlay. */
#viewport.tool-active .page-wrap { cursor: crosshair; }
#viewport.tool-active .page-wrap canvas { pointer-events: none; }
.annot-preview { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

/* ── Body: rail + viewport ───────────────────────────────────────────────────── */
#body { flex: 1; display: flex; min-height: 0; }

#rail {
  width: var(--rail-w); flex: 0 0 auto;
  background: var(--bg-sunken); border-right: 1px solid var(--panel-border);
  overflow-y: auto; padding: var(--sp-2);
  display: flex; flex-direction: column; gap: var(--sp-2);
}
#rail.hidden { display: none; }
.thumb {
  position: relative; border: 2px solid transparent; border-radius: var(--r-sm);
  background: var(--bg-raised); cursor: pointer; overflow: hidden;
}
.thumb canvas { display: block; width: 100%; height: auto; background: #fff; }
.thumb .pno {
  position: absolute; bottom: 3px; right: 4px; font-size: 10px; color: var(--fg);
  background: var(--overlay); padding: 1px 5px; border-radius: 8px;
}
.thumb.selected { border-color: var(--accent); }
.thumb.current { box-shadow: inset 0 0 0 2px var(--accent-soft); }

#viewport {
  flex: 1; min-width: 0; overflow: auto; background: var(--canvas-bg);
  padding: var(--sp-5) var(--sp-4); display: flex; flex-direction: column;
  align-items: center; gap: var(--sp-5);
  /* Reserve the scrollbar gutter so clientWidth never changes when content
     appears/disappears. Without this, a render adds a scrollbar → clientWidth
     shrinks → the ResizeObserver re-renders → content toggles the scrollbar → a
     feedback loop where no render completes (blank viewport after every op). */
  scrollbar-gutter: stable;
}
.page-wrap { position: relative; box-shadow: var(--page-shadow); background: #fff; }
.page-wrap canvas { display: block; }
.page-wrap .badge {
  position: absolute; top: 6px; left: 6px; font-size: 11px; color: var(--fg);
  background: var(--overlay); padding: 2px 7px; border-radius: 8px; pointer-events: none;
}

/* ── Empty / welcome ─────────────────────────────────────────────────────────── */
#welcome {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: var(--sp-4); padding: var(--sp-6);
}
#welcome.hidden { display: none; }
#welcome .drop {
  border: 2px dashed var(--panel-border); border-radius: var(--r-lg);
  padding: var(--sp-6) calc(var(--sp-6) * 1.4); transition: border-color .15s, background .15s;
}
#welcome .drop.over { border-color: var(--accent); background: var(--accent-soft); }
#welcome h1 { font-size: 24px; margin: 0; }
#welcome p { color: var(--fg-muted); max-width: 440px; margin: 0 auto; }
#welcome .actions { display: flex; gap: var(--sp-2); justify-content: center; flex-wrap: wrap; }
#welcome .privacy { font-size: 12px; color: var(--fg-faint); display: flex; align-items: center; gap: 6px; }
#welcome .privacy svg { width: 14px; height: 14px; flex: 0 0 auto; }
#welcome .drop > div:first-child svg { width: 46px; height: 46px; }

/* ── Status bar ──────────────────────────────────────────────────────────────── */
#statusbar {
  height: 28px; flex: 0 0 auto; display: flex; align-items: center; gap: var(--sp-3);
  padding: 0 var(--sp-3); background: var(--bg-raised); border-top: 1px solid var(--panel-border);
  font-size: 12px; color: var(--fg-muted);
}
#statusbar .spacer { flex: 1; }
#statusbar .zoom { display: flex; align-items: center; gap: 4px; }
#statusbar button { background: none; border: none; color: var(--fg-muted); cursor: pointer; padding: 2px 5px; border-radius: 4px; display: inline-flex; align-items: center; }
#statusbar button:hover:not(:disabled) { background: var(--bg-sunken); color: var(--fg); }
#statusbar button:disabled { opacity: .35; cursor: default; }
#statusbar button svg { width: 14px; height: 14px; display: block; }
#statusbar .filenav span { font-size: 12px; }

/* ── Toasts ──────────────────────────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: var(--sp-2); z-index: 60; align-items: center;
}
.toast {
  padding: 10px 16px; border-radius: var(--r-md); background: var(--panel);
  border: 1px solid var(--panel-border); box-shadow: var(--shadow-pop);
  max-width: 70vw; animation: toast-in .18s ease-out;
}
.toast.err { border-color: var(--danger); }
.toast.warn { border-color: var(--warn); }
.toast.ok { border-color: var(--ok); }
.toast .detail { display: block; font-size: 12px; color: var(--fg-muted); margin-top: 3px; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Modal ───────────────────────────────────────────────────────────────────── */
#modal-root { position: fixed; inset: 0; z-index: 80; display: none; }
#modal-root.open { display: block; }
#modal-root .scrim { position: absolute; inset: 0; background: var(--overlay); }
#modal-root .modal {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop); min-width: 360px; max-width: 560px; max-height: 80vh; overflow: auto;
}
#modal-root .modal h2 { margin: 0; padding: var(--sp-4); border-bottom: 1px solid var(--panel-border); font-size: 16px; }
#modal-root .modal .body { padding: var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-3); }
#modal-root .modal .body label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--fg-muted); }
#modal-root .modal .body input, #modal-root .modal .body select {
  background: var(--bg-sunken); border: 1px solid var(--panel-border); color: var(--fg);
  border-radius: var(--r-sm); padding: 8px 10px; font-size: 14px;
}
#modal-root .modal .row { display: flex; gap: var(--sp-2); }
#modal-root .modal .foot { display: flex; justify-content: flex-end; gap: var(--sp-2); padding: var(--sp-4); border-top: 1px solid var(--panel-border); }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); }
.setting-row .desc { font-size: 12px; color: var(--fg-faint); }

/* ── Compat warning ──────────────────────────────────────────────────────────── */
#compat { display: none; padding: var(--sp-6); text-align: center; }
#compat.show { display: block; }

#loading-bar {
  position: fixed; top: 0; left: 0; height: 2px; background: var(--accent);
  width: 0; transition: width .2s; z-index: 90;
}

.recovery-banner {
  flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3);
  padding: 8px var(--sp-4); background: var(--accent-soft); border-bottom: 1px solid var(--panel-border);
  font-size: 13px;
}

</style>
</head>
<body>
  <div id="loading-bar"></div>
  <div id="app" data-version="0.2.0">

    <div id="compat">
      <h1>Sheaf needs a modern browser</h1>
      <p>Sheaf uses the File System Access API, IndexedDB, and WebCrypto. Please use a recent Chromium browser (Chrome / Edge / Brave / Arc) for the full experience, or a current Firefox / Safari for open-and-download mode.</p>
    </div>

    <div id="toolbar" role="toolbar" aria-label="Main toolbar"></div>

    <div id="welcome" role="main" aria-label="Open a PDF to get started"></div>

    <div id="body" class="hidden">
      <div id="rail" role="listbox" aria-label="Page thumbnails"></div>
      <div id="viewport" role="application" aria-label="PDF pages" tabindex="0"></div>
    </div>

    <div id="statusbar" role="status" aria-live="polite"></div>
  </div>

  <div id="toasts" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-root" aria-live="polite"></div>

  
<script type="module">
/* core/engines.js */
const __m_core_engines = (() => {
// engines.js — vendored-engine loader. Probe → lazy-load on first use → verify
// SHA-256 → cache. Fail loud on mismatch. No runtime CDN; everything is served
// same-origin from /engines. Never surprise-download multi-MB assets — callers
// gate the first load behind an explicit action.
//
// Engines are dependency-injected so the deterministic core stays testable:
// the browser bootstrap calls loadEngine(); a Node test calls registerEngine()
// with a directly-imported module. Either way ops read engines via getEngine().

// The pin manifest. Paths are relative to ENGINES_BASE; sha256 is verified before
// the module is allowed to execute. Bump version + sha together, never one alone.
const MANIFEST = {
  'pdf-lib': {
    version: '1.17.1',
    path: 'pdf-lib/1.17.1/pdf-lib.esm.js',
    sha256: '4bd8dd3155d7b1062a161567bf68168c55283bd5fad6a638b16ae028846b52c5',
    sizeHint: '1.5 MB',
  },
  'pdfjs': {
    version: '6.1.200',
    path: 'pdfjs/6.1.200/pdf.min.mjs',
    sha256: '4ba2f15599b03fde8755ad91349920c21dadd3e8fd6b6460a7663d46d4cf21b5',
    sizeHint: '450 KB',
    worker: {
      path: 'pdfjs/6.1.200/pdf.worker.min.mjs',
      sha256: '2ab9e09667296dab1a618868b3ce6e6c23d5b8f48120ae7c5b34e7e335ed01fa',
    },
  },
  // Tesseract is loaded by core/ocr.js (multi-file: worker + embedded-wasm core + lang),
  // not through loadEngine — recorded here as the integrity pin + version-of-record.
  'tesseract': {
    version: '5.1.1',
    integrity: {
      'tesseract.esm.min.js': '2537be686335e4b2637e933cdc85a52dd80267a592689c1bd63235c8591540ae',
      'worker.min.js': 'aca1229639fc9907d86f96e825955a2b7c5716d17f3bc3acd71f9c7ab66181fc',
      'tesseract-core-simd-lstm.wasm.js': 'ce20eda9533cbed1e6c2b4276fbae1e0adc61b6754b5513084be601787b457cf',
      'eng.traineddata.gz': '18c1ac52b75e35d44735fb6c2a60acfaf23033524653200738e98f0243edb75b',
    },
    sizeHint: '6.6 MB',
  },
};

let BASE = '/engines';
function setEnginesBase(p) { BASE = p.replace(/\/$/, ''); }
function enginesBase() { return BASE; }

const _loaded = new Map();   // name -> module
const _loading = new Map();  // name -> Promise

function registerEngine(name, mod) { _loaded.set(name, mod); }
function getEngine(name) {
  const m = _loaded.get(name);
  if (!m) throw new Error(`Engine "${name}" not loaded — call loadEngine() first`);
  return m;
}
function isLoaded(name) { return _loaded.has(name); }

async function sha256Hex(buf) {
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// Fetch the vendored file, verify its hash, then import it. The verify-then-import
// uses a same-origin re-fetch (served from cache); the hash is a tamper tripwire on
// the vendored bundle, not an anti-MITM measure (same-origin already gives us that).
async function loadEngine(name) {
  if (_loaded.has(name)) return _loaded.get(name);
  if (_loading.has(name)) return _loading.get(name);

  const entry = MANIFEST[name];
  if (!entry) throw new Error(`Unknown engine "${name}"`);

  const p = (async () => {
    const url = `${BASE}/${entry.path}`;
    let bytes;
    try {
      const res = await fetch(url, { cache: 'force-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      bytes = await res.arrayBuffer();
    } catch (err) {
      throw new Error(`Engine "${name}" failed to load from ${url}: ${err.message}`);
    }
    const got = await sha256Hex(bytes);
    if (got !== entry.sha256) {
      throw new Error(`Engine "${name}" integrity check FAILED — expected ${entry.sha256}, got ${got}. Refusing to load a tampered bundle.`);
    }
    const mod = await import(/* @vite-ignore */ url);
    _loaded.set(name, mod);
    return mod;
  })();

  _loading.set(name, p);
  try { return await p; }
  finally { _loading.delete(name); }
}

// PDF.js needs its worker pinned too. Returns the same-origin worker URL after the
// engine is loaded; the caller assigns GlobalWorkerOptions.workerSrc.
function pdfjsWorkerUrl() {
  return `${BASE}/${MANIFEST.pdfjs.worker.path}`;
}

return { MANIFEST, setEnginesBase, enginesBase, registerEngine, getEngine, isLoaded, loadEngine, pdfjsWorkerUrl };
})();

/* core/history.js */
const __m_core_history = (() => {
// history.js — the op-log + periodic snapshots that make replay possible.
//
// Sheaf's M0 gate: "event-log replay reconstructs state." State is the document.
// We log every committed op; we snapshot the serialized PDF bytes every N ops.
// To reach pointer P we load the nearest snapshot at/below P and re-run the ops
// after it. Undo/redo and crash-restore are the SAME walk — one mechanism.
//
// Same shape as Slate's history (suite convention); the snapshot payload is PDF
// bytes (Uint8Array) instead of an ImageData.

const MAX_STEPS = 80;
const SNAPSHOT_INTERVAL = 8;

class History {
  constructor() {
    this._ops = [];      // [{ op, params }]
    this._snaps = [];    // [{ pointer, bytes }]   pointer -1 snap = the originally-opened bytes
    this._pointer = -1;  // -1 = original document, pre-any-op
  }

  // Record an op at the tip, truncating any redo branch. Returns the new pointer.
  push(op, params) {
    this._ops = this._ops.slice(0, this._pointer + 1);
    this._snaps = this._snaps.filter(s => s.pointer <= this._pointer);
    this._ops.push({ op, params });

    if (this._ops.length > MAX_STEPS) {
      const removed = this._ops.length - MAX_STEPS;
      this._ops = this._ops.slice(removed);
      this._snaps = this._snaps
        .filter(s => s.pointer >= removed)
        .map(s => ({ ...s, pointer: s.pointer - removed }));
      this._pointer = Math.max(-1, this._pointer - removed);
    }
    this._pointer = this._ops.length - 1;
    return this._pointer;
  }

  // Snapshot the document bytes at a pointer. The -1 (original) snapshot is always
  // kept regardless of interval — it's the replay floor. Others land on the interval.
  saveSnapshot(pointer, bytes) {
    if (pointer !== -1 && pointer % SNAPSHOT_INTERVAL !== 0) return;
    this._snaps = this._snaps.filter(s => s.pointer !== pointer);
    this._snaps.push({ pointer, bytes });
  }

  // The plan to reach targetPointer: the nearest snapshot at/below it + the ops
  // that must be re-run after that snapshot.
  getReplayPlan(targetPointer) {
    const snap = this._snaps
      .filter(s => s.pointer <= targetPointer)
      .sort((a, b) => b.pointer - a.pointer)[0] ?? null;
    const startPointer = snap ? snap.pointer : -1;
    const ops = this._ops.slice(startPointer + 1, targetPointer + 1);
    return { snap, ops };
  }

  // The full op log up to and including the current pointer (for export as a
  // re-runnable pipeline — the sovereign-artifact thesis, Bench §5).
  opsUpToPointer(pointer = this._pointer) {
    return this._ops.slice(0, pointer + 1).map(({ op, params }) => ({ op, params }));
  }

  canUndo() { return this._pointer >= 0; }
  canRedo() { return this._pointer < this._ops.length - 1; }
  stepBack() { if (!this.canUndo()) return false; this._pointer--; return true; }
  stepForward() { if (!this.canRedo()) return false; this._pointer++; return true; }

  get pointer() { return this._pointer; }
  get size() { return this._ops.length; }
  peek(pointer = this._pointer) { return this._ops[pointer] ?? null; }

  clear() { this._ops = []; this._snaps = []; this._pointer = -1; }
}

return { History };
})();

/* core/events.js */
const __m_core_events = (() => {
// events.js — the suite event bus (nakli-creative-primitives convention).
// A tiny synchronous pub/sub. One bus per tab; modules talk through topics, never
// by reaching into each other. Lifted from the shared primitive so tools 2–5 see
// the same shape.

const _bus = new Map();

function on(type, fn) {
  if (!_bus.has(type)) _bus.set(type, new Set());
  _bus.get(type).add(fn);
  return () => off(type, fn);
}

function off(type, fn) {
  _bus.get(type)?.delete(fn);
}

function once(type, fn) {
  const wrapper = (data) => { off(type, wrapper); fn(data); };
  on(type, wrapper);

function emit(type, data) {

/* ops/textsafe.js */
const __m_ops_textsafe = (() => {
// textsafe.js — make arbitrary text safe to draw with pdf-lib's standard fonts.
//
// Standard fonts (Helvetica etc.) encode WinAnsi/CP1252 only, so drawText THROWS on
// any character outside it (an arrow, a maths symbol, CJK, an emoji). For v1.0 we
// sanitize: keep CP1252-encodable characters, map a handful of common symbols to
// ASCII, and replace anything else with '?'. This guarantees text ops never crash on
// real-world input. Full Unicode (non-Latin scripts) needs a vendored Unicode font +
// fontkit — a v1.x addition; until then those characters degrade to '?', visibly, not
// a silent failure or a crash.

// Symbol → ASCII mappings for common non-CP1252 characters worth preserving meaning.
const MAP = {
  '→': '->', '←': '<-', '↔': '<->', '⇒': '=>', '⇐': '<=',
  '≤': '<=', '≥': '>=', '≠': '!=', '≈': '~', '×': 'x', '÷': '/',
  '−': '-', ' ': ' ', ' ': ' ', ' ': ' ', ' ': ' ',
  '′': "'", '″': '"', '⁄': '/',
};

// CP1252 code points above 0xFF that the WinAnsi encoder DOES handle (smart quotes,
// dashes, ellipsis, euro, bullet, trademark, …). Keep these as-is.
const CP1252_EXTRA = new Set([
  0x20AC, 0x201A, 0x0192, 0x201E, 0x2026, 0x2020, 0x2021, 0x02C6, 0x2030, 0x0160,
  0x2039, 0x0152, 0x017D, 0x2018, 0x2019, 0x201C, 0x201D, 0x2022, 0x2013, 0x2014,
  0x02DC, 0x2122, 0x0161, 0x203A, 0x0153, 0x017E, 0x0178,
]);

function winAnsiSafe(input) {
  let out = '';
  for (const ch of String(input)) {
    if (MAP[ch] !== undefined) { out += MAP[ch]; continue; }
    const cp = ch.codePointAt(0);
    if (ch === '\n' || ch === '\t') { out += ch; continue; }
    if (cp >= 0x20 && cp <= 0x7E) { out += ch; continue; }          // printable ASCII
    if (cp >= 0xA0 && cp <= 0xFF) { out += ch; continue; }          // Latin-1 high
    if (CP1252_EXTRA.has(cp)) { out += ch; continue; }              // CP1252 extras
    out += '?';                                                     // visible fallback
  }
  return out;
}

return { winAnsiSafe };
})();

const __m_core_zip = (() => {
// zip.js — a minimal, dependency-free ZIP writer (STORE method, no compression). Page
// images (PNG/JPEG) are already compressed, so storing them is fine and keeps this tiny.
// Used to bundle a PDF→images export into one download instead of N save prompts.

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1; t[n] = c >>> 0; }

})();
function crc32(bytes) {
  let c = 0xffffffff;
  for (let i = 0; i < bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}

// files: [{ name, bytes:Uint8Array }] → a ZIP as Uint8Array.
function makeZip(files) {
  const enc = new TextEncoder();
  const locals = [];
  const central = [];
  let offset = 0;

  for (const f of files) {
    const nameBytes = enc.encode(f.name);
    const crc = crc32(f.bytes);
    const size = f.bytes.length;

    const local = new Uint8Array(30 + nameBytes.length + size);
    const lv = new DataView(local.buffer);
    lv.setUint32(0, 0x04034b50, true);   // local file header sig
    lv.setUint16(4, 20, true);           // version needed
    lv.setUint16(6, 0, true);            // flags
    lv.setUint16(8, 0, true);            // method 0 = store
    lv.setUint16(10, 0, true);           // mod time
    lv.setUint16(12, 0, true);           // mod date
    lv.setUint32(14, crc, true);
    lv.setUint32(18, size, true);        // compressed size
    lv.setUint32(22, size, true);        // uncompressed size
    lv.setUint16(26, nameBytes.length, true);
    lv.setUint16(28, 0, true);           // extra len
    local.set(nameBytes, 30);
    local.set(f.bytes, 30 + nameBytes.length);
    locals.push(local);

    const cd = new Uint8Array(46 + nameBytes.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true);   // central dir sig
    cv.setUint16(4, 20, true);           // version made by
    cv.setUint16(6, 20, true);           // version needed
    cv.setUint32(16, crc, true);
    cv.setUint32(20, size, true);
    cv.setUint32(24, size, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint32(42, offset, true);      // local header offset
    cd.set(nameBytes, 46);
    central.push(cd);

    offset += local.length;
  }

  const centralSize = central.reduce((a, c) => a + c.length, 0);
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);     // EOCD sig
  ev.setUint16(8, files.length, true);   // entries this disk
  ev.setUint16(10, files.length, true);  // total entries
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, offset, true);        // central dir offset

  const total = offset + centralSize + 22;
  const out = new Uint8Array(total);
  let p = 0;
  for (const l of locals) { out.set(l, p); p += l.length; }
  for (const c of central) { out.set(c, p); p += c.length; }
  out.set(eocd, p);
  return out;
}

})();

const __m_ui_signature = (() => {
// signature.js — the signature chooser. Type it, draw it, upload an image, or pick a
// saved one. Drawn/uploaded signatures can be saved to a local library (IndexedDB —
// the storage façade's signature store). Returns the chosen signature; the sign tool
// places it. Resolves null on cancel.
//
//   { kind: 'text',  name, dateText }
//   { kind: 'image', bytes }

const el = __m_ui_dom.el;
const clear = __m_ui_dom.clear;
const openModal = __m_ui_modal.openModal;
const storage = __m_core_storage;
const toast = __m_ui_toast.toast;

function chooseSignature() {

}

function build({ close }) {

  }
  root.append(tabs, panel);
  setTab('type');
  return root;
}

const PANELS = {
  type(close) {
    const name = el('input', { type: 'text', placeholder: 'Your name', style: 'width:100%' });
    const withDate = el('input', { type: 'checkbox', checked: true, style: 'width:16px;height:16px' });

      el('label', {}, ['Signature', name]),
      el('label', { style: 'flex-direction:row;align-items:center;gap:8px' }, [withDate, 'Include today’s date']),
      el('div', { style: 'display:flex;justify-content:flex-end' }, [
        el('button', { class: 'btn primary', onClick: () => { if (name.value.trim()) close({ kind: 'text', name: name.value.trim(), dateText: withDate.checked ? new Date().toLocaleDateString() : '' }); } }, ['Use']),

  draw(close) {

    const ctx = canvas.getContext('2d');
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#111';

        el('div', { style: 'display:flex;gap:8px' }, [

  upload(close) {

      el('p', { text: 'Choose a PNG or JPEG of your signature (a transparent PNG looks best).', style: 'font-size:13px;color:var(--fg-muted)' }),
      input,
      el('label', { style: 'flex-direction:row;align-items:center;gap:8px;font-size:13px' }, [save, 'Save to library']),

      ]),

  saved(close) {

    const wrap = el('div', { style: 'display:flex;flex-direction:column;gap:8px' }, [grid]);
    storage.listSignatures().then((sigs) => {
      if (!sigs.length) { grid.append(el('div', { text: 'No saved signatures yet — draw or upload one and tick “Save to library”.', style: 'grid-column:1/-1;font-size:13px;color:var(--fg-faint)' })); return; }
      for (const s of sigs) {
        const url = URL.createObjectURL(new Blob([s.bytes], { type: 'image/png' }));
        const cell = el('div', { style: 'position:relative;border:1px solid var(--panel-border);border-radius:6px;padding:4px;cursor:pointer;background:#fff', onClick: () => close({ kind: 'image', bytes: s.bytes }) }, [

async function canvasPng(canvas) {
  const url = canvas.toDataURL('image/png');
  const bin = atob(url.slice(url.indexOf(',') + 1));

  return u8;

async function persist(bytes) {
  const id = (crypto.randomUUID?.() || `sig-${Date.now()}`);

const __m_ui_spanedit = (() => {
// spanedit.js — edit text in place. Click on a line of text; we locate the text run
// under the click via the PDF.js text layer, pre-fill its content, and on submit
// whiteout that exact region and retype at the matched size. This is the practical
// ~80% of "span-replace": position + size are matched automatically (no manual region
// drawing). Matching the original EMBEDDED font is the v1.x step — retype uses Helvetica.

const currentRenderDoc = __m_ui_rendoc.currentRenderDoc;
const dispatch = __m_core_runner.dispatch;
const formModal = __m_ui_modal.formModal;
const toast = __m_ui_toast.toast;

// Find the text run under a normalized (0..1) click on a page.
async function findRun(pageIndex, nx, ny) {
  const pdf = currentRenderDoc();
  if (!pdf) return null;
  const page = await pdf.getPage(pageIndex + 1);
  const vp = page.getViewport({ scale: 1 });
  const W = vp.width, H = vp.height;
  const tc = await page.getTextContent();
  let best = null, bestD = Infinity;
  for (const it of tc.items) {
    if (!it.str || !it.str.trim()) continue;
    const [, b, , d, e, f] = it.transform;
    const h = it.height || Math.hypot(b, d) || 10;
    const w = it.width || 0;
    const x0 = e / W, y0 = (H - (f + h)) / H, x1 = (e + w) / W, y1 = (H - f) / H;
    if (nx >= x0 - 0.012 && nx <= x1 + 0.012 && ny >= y0 - 0.012 && ny <= y1 + 0.012) {
      const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2, dd = (nx - cx) ** 2 + (ny - cy) ** 2;
      if (dd < bestD) { bestD = dd; best = { str: it.str, x: x0, y: y0, w: w / W, h: h / H, fontSize: h }; }
    }
  }
  return best;
}

async function editTextAt(pageIndex, nx, ny) {
  let run;
  try { run = await findRun(pageIndex, nx, ny); }
  catch (e) { return toast('Could not read the text layer', 'err', { detail: e.message }); }
  if (!run) return toast('No editable text there — use the Whiteout tool for scanned text', 'warn');

  const v = await formModal('Edit text', [
    { name: 'text', label: 'Replace with (leave blank to just remove)', value: run.str },
    { name: 'fontSize', label: 'Size (pt)', type: 'number', value: Math.round(run.fontSize) },
  ]);
  if (!v) return;
  // Cover the detected run (a touch of padding) and retype over it.
  dispatch('text.whiteout', {
    page: pageIndex,
    x: Math.max(0, run.x - 0.003), y: Math.max(0, run.y - 0.003),
    w: Math.min(1, run.w + 0.006), h: Math.min(1, run.h + 0.008),
    text: v.text, fontSize: v.fontSize,
  });
}

return { editTextAt };
})();

/* ui/annotate-tools.js */
const __m_ui_annotate_tools = (() => {
// annotate-tools.js — the interactive annotation layer. When a tool is active, a
// pointer gesture on a page becomes normalized (0..1) coordinates and dispatches an
// annotate.* op through the one runner. A live preview overlay shows the shape mid-
// gesture; the committed draw comes back through the normal render path.

const state = __m_core_state.state;
const on = __m_core_events.on;
const emit = __m_core_events.emit;
const dispatch = __m_core_runner.dispatch;
const el = __m_ui_dom.el;
const formModal = __m_ui_modal.formModal;
const chooseSignature = __m_ui_signature.chooseSignature;
const editTextAt = __m_ui_spanedit.editTextAt;

const DRAG_TOOLS = new Set(['highlight', 'rect', 'line', 'pencil', 'whiteout', 'redact']);
const ALL_TOOLS = new Set([...DRAG_TOOLS, 'text', 'sign', 'edittext']);

const toolSettings = { color: '#ff3b30', highlightColor: '#ffe14d', thickness: 2 };

let viewport = null;
let active = null;
let gesture = null;
let preview = null;

function currentTool() { return active; }

function setTool(tool) {
  active = ALL_TOOLS.has(tool) ? tool : null;
  state.activeTool = active;
  viewport.classList.toggle('tool-active', !!active);
  emit('tool:changed', { tool: active });
}

function initAnnotateTools() {
  viewport = document.getElementById('viewport');
  viewport.addEventListener('pointerdown', onDown);
  // A fresh document clears the active tool.
  on('doc:loaded', () => setTool(null));
}

function wrapUnder(target) { return target?.closest?.('.page-wrap'); }

function normalize(rect, clientX, clientY) {
  return {
    x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
  };
}

async function onDown(e) {
  if (!active) return;
  const wrap = wrapUnder(e.target);
  if (!wrap) return;
  const canvas = wrap.querySelector('canvas');
  const rect = canvas.getBoundingClientRect();
  const page = Number(wrap.dataset.page);

  if (active === 'text') {
    const at = normalize(rect, e.clientX, e.clientY);
    const v = await formModal('Text box', [
      { name: 'text', label: 'Text', value: '' },
      { name: 'fontSize', label: 'Size (pt)', type: 'number', value: 14 },
    ]);
    if (v?.text) dispatch('annotate.textbox', { page, x: at.x, y: at.y, text: v.text, fontSize: v.fontSize, color: toolSettings.color });
    return;
  }

  if (active === 'edittext') {
    const at = normalize(rect, e.clientX, e.clientY);
    editTextAt(page, at.x, at.y);
    return;
  }

  if (active === 'sign') {
    const at = normalize(rect, e.clientX, e.clientY);
    const sig = await chooseSignature();
    if (!sig) return;
    if (sig.kind === 'text') dispatch('sign.place', { page, x: at.x, y: at.y, name: sig.name, dateText: sig.dateText, color: toolSettings.color });
    else dispatch('sign.image', { page, x: at.x, y: at.y, width: 0.28, imageBytes: sig.bytes });
    return;
  }

  e.preventDefault();
  const start = normalize(rect, e.clientX, e.clientY);
  gesture = { wrap, page, rect, start, cur: null, points: [start] };
  preview = el('div', { class: 'annot-preview' });
  wrap.style.position = 'relative';
  wrap.appendChild(preview);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp, { once: true });
}

function onMove(e) {
  if (!gesture) return;
  gesture.cur = normalize(gesture.rect, e.clientX, e.clientY);
  gesture.points.push(gesture.cur);
  drawPreview();
}

function drawPreview() {
  const { start, cur, points } = gesture;
  if (active === 'pencil') {
    const d = points.map((p, i) => `${i ? 'L' : 'M'}${(p.x * 100).toFixed(2)} ${(p.y * 100).toFixed(2)}`).join(' ');
    preview.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%"><path d="${d}" fill="none" stroke="${toolSettings.color}" stroke-width="0.4"/></svg>`;
    return;
  }
  if (!cur) return;
  if (active === 'highlight' || active === 'rect' || active === 'whiteout' || active === 'redact') {
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    const style = active === 'highlight' ? `background:${toolSettings.highlightColor};opacity:.4`
      : active === 'whiteout' ? `background:#fff;border:1px dashed #999`
      : active === 'redact' ? `background:#000`
      : `border:2px solid ${toolSettings.color}`;
    preview.innerHTML = `<div style="position:absolute;left:${x * 100}%;top:${y * 100}%;width:${w * 100}%;height:${h * 100}%;${style}"></div>`;
  } else if (active === 'line') {
    preview.innerHTML = `<svg style="position:absolute;inset:0;width:100%;height:100%"><line x1="${start.x * 100}%" y1="${start.y * 100}%" x2="${cur.x * 100}%" y2="${cur.y * 100}%" stroke="${toolSettings.color}" stroke-width="2"/></svg>`;
  }
}

function onUp() {
  window.removeEventListener('pointermove', onMove);
  if (!gesture) return;
  const g = gesture; gesture = null;
  if (preview) { preview.remove(); preview = null; }
  const { start, cur, points, page } = g;

  if (active === 'highlight' || active === 'rect') {
    if (!cur) return;
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    if (w < 0.005 || h < 0.005) return; // ignore stray clicks
    if (active === 'highlight') dispatch('annotate.highlight', { page, x, y, w, h, color: toolSettings.highlightColor });
    else dispatch('annotate.rect', { page, x, y, w, h, color: toolSettings.color, thickness: toolSettings.thickness });
  } else if (active === 'line') {
    if (!cur) return;
    dispatch('annotate.line', { page, x1: start.x, y1: start.y, x2: cur.x, y2: cur.y, color: toolSettings.color, thickness: toolSettings.thickness });
  } else if (active === 'pencil') {
    if (points.length >= 2) dispatch('annotate.pencil', { page, points, color: toolSettings.color, thickness: toolSettings.thickness });
  } else if (active === 'whiteout') {
    if (!cur) return;
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    if (w < 0.005 || h < 0.005) return;
    whiteoutRegion(page, x, y, w, h);
  } else if (active === 'redact') {
    if (!cur) return;
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    if (w < 0.005 || h < 0.005) return;
    dispatch('redact.region', { page, x, y, w, h }); // true removal + black box
  }
}

async function whiteoutRegion(page, x, y, w, h) {
  const v = await formModal('Whiteout & retype', [
    { name: 'text', label: 'Replacement text (optional)', value: '' },
    { name: 'fontSize', label: 'Size (pt)', type: 'number', value: 12 },
  ]);
  if (v) dispatch('text.whiteout', { page, x, y, w, h, text: v.text || '', fontSize: v.fontSize, textColor: toolSettings.color });

return { toolSettings, currentTool, setTool, initAnnotateTools };
})();

/* core/sidecar.js */
const __m_core_sidecar = (() => {
// sidecar.js — the AI sidecar surfaces. Each rides a REAL Sheaf surface, sends only
// the minimum slice the task needs, and returns a STAGED proposal — it never commits.
// The proposal is executed (or not) through the deterministic registry ops, so the AI
// is a removable passenger: remove this file and metadata/redaction still work by hand.
//
// Cost is opt-in (these run only on an explicit user action). Consequence is opt-in
// (callers stage the result and let the user confirm before dispatching the op).

const complete = __m_core_ai.complete;
const isAvailable = __m_core_ai.isAvailable;
const openForRender = __m_core_render.openForRender;

// Text items with normalized (0..1, top-left) boxes — for redaction targeting.
async function pageTextItems(pdf, pageIndex) {
  const page = await pdf.getPage(pageIndex + 1);
  const vp = page.getViewport({ scale: 1 });
  const W = vp.width, H = vp.height;
  const tc = await page.getTextContent();
  return tc.items.filter(it => it.str?.trim()).map(it => {
    const [, b, , d, e, f] = it.transform;
    const h = it.height || Math.hypot(b, d) || 10;
    return { str: it.str, x: e / W, y: (H - (f + h)) / H, w: (it.width || 0) / W, h: h / H };
  });
}

// suggest-metadata — infer title/author/subject/keywords from a SLICE of the text.
// The slice (not the whole document) is what leaves, to the user's own provider.
async function suggestMetadata(doc) {
  if (!isAvailable()) throw new Error('No model configured');
  const pdf = await openForRender(await doc.toBytes());
  let text = '';
  for (let i = 0; i < Math.min(pdf.numPages, 2); i++) {
    const tc = await (await pdf.getPage(i + 1)).getTextContent();
    text += tc.items.map(x => x.str).join(' ') + '\n';
  }
  pdf.destroy?.();
  text = text.replace(/\s+/g, ' ').slice(0, 4000); // minimum slice
  if (!text.trim()) throw new Error('No extractable text (a scanned PDF needs OCR first)');
  const out = await complete([
    { role: 'user', content: `Infer concise document metadata from this text. Return JSON {"title","author","subject","keywords"} — keywords comma-separated, empty string when unknown.\n\n${text}` },
  ], { json: true });
  return {
    title: out.title || '', author: out.author || '', subject: out.subject || '',
    keywords: Array.isArray(out.keywords) ? out.keywords.join(', ') : (out.keywords || ''),
  };
}

// describe-to-redact — the model only sees the DESCRIPTION ("account numbers"), turns it
// into regex patterns; positions are found LOCALLY via PDF.js. The document's text never
// leaves the machine for this. Returns proposed redaction regions to STAGE for review.
async function describeToRedact(doc, description) {
  if (!isAvailable()) throw new Error('No model configured');
  const out = await complete([
    { role: 'user', content: `The user wants to redact: "${description}". Return JSON {"patterns":["<regex source>", ...]} — JavaScript regular-expression sources (no slashes, no flags) that match such text. Be precise; prefer specific patterns over broad ones.` },
  ], { json: true });
  const sources = Array.isArray(out.patterns) ? out.patterns : [];
  const patterns = sources.map(p => { try { return new RegExp(p, 'gi'); } catch { return null; } }).filter(Boolean);
  if (!patterns.length) return { regions: [], patterns: sources };

  const pdf = await openForRender(await doc.toBytes());
  const regions = [];
  for (let i = 0; i < pdf.numPages; i++) {
    for (const it of await pageTextItems(pdf, i)) {
      for (const re of patterns) { re.lastIndex = 0; if (re.test(it.str)) { regions.push({ page: i, x: it.x, y: it.y, w: it.w, h: it.h, text: it.str }); break; } }
    }
  }
  pdf.destroy?.();
  return { regions, patterns: sources };
}

return { suggestMetadata, describeToRedact };
})();

function buildPageOps() {
  const make = (iconName, title, menuLabel, run, danger = false) => {
    const b = btn(iconName, '', run, { needsDoc: true, danger, title });

  };

    make('insert', 'insert', 'Insert blank page',   onInsert),

    make('ocr',    'ocr',    'OCR text layer…',     openOcrMenu),
    make('download', 'Convert / Export', 'Convert / Export…', openConvertMenu),
    make('info',   'info',   'Document metadata…',  onMetadata),

// Fold the lowest-priority page ops into the More menu until the toolbar fits — pure
// width math on the live layout (no hard-coded breakpoints), so it's correct at any
// width. overflow:hidden in CSS is the backstop; this keeps everything *reachable*.
function fit() {
  if (!bar || !pageOpsGroup) return;
  for (const p of pageOps) { p.b.style.display = ''; p.folded = false; }

/* ui/recovery.js */
const __m_ui_recovery = (() => {
// recovery.js — crash recovery via the OPFS staging layer. While you have unsaved
// edits, the working bytes are staged to OPFS (debounced); if the tab crashes or is
// closed before saving, the next visit offers to recover them. The stage is CLEARED
// the moment you save (or discard) — so PDF bytes only ever live on disk transiently,
// as in-flight unsaved work, never as durable persistence. This is the one place a
// document's bytes touch disk, and it is self-cleaning.

const state = __m_core_state.state;
const markDirty = __m_core_state.markDirty;
const on = __m_core_events.on;
const storage = __m_core_storage;
const el = __m_ui_dom.el;
const openBytes = __m_ui_fileops.openBytes;

const STAGE_DEBOUNCE = 3000;
let timer = null;

async function initRecovery() {
  if (!storage.hasOPFS) return; // no OPFS → no crash staging (Firefox/Safari degrade)

  on('doc:changed', scheduleStage);              // edits → stage soon
  on('dirty:changed', ({ dirty }) => { if (!dirty) { clearTimeout(timer); storage.clearStage(); } }); // saved/opened → safe, clear
  on('doc:closed', () => { clearTimeout(timer); storage.clearStage(); });

  // Offer recovery on boot, BEFORE any document loads (a fresh open clears the stage).
  try {
    const staged = await storage.recoverStaged();
    if (staged?.bytes?.length) offerRecovery(staged);
  } catch {}
}

function scheduleStage() {
  if (!state.doc) return;
  clearTimeout(timer);
  timer = setTimeout(async () => {
    if (!state.dirty || !state.doc) return;
    try { await storage.stageWorking(await state.doc.toBytes(), { fileName: state.session.fileName }); } catch {}
  }, STAGE_DEBOUNCE);
}

function offerRecovery(staged) {
  const name = staged.meta?.fileName || 'an untitled document';
  const banner = el('div', { class: 'recovery-banner', role: 'alert' }, [
    el('span', { html: `Unsaved changes to <b>${escapeHtml(name)}</b> from your last session were found.` }),
    el('div', { style: 'display:flex;gap:8px' }, [
      el('button', {
        // The recovered doc exists nowhere durable — it IS unsaved work, so mark it
        // dirty (open normally resets the flag) or the user gets no save nudge.
        class: 'btn primary', onClick: async () => { banner.remove(); await openBytes(staged.bytes, name); markDirty(true); },
      }, ['Recover']),
      el('button', { class: 'btn', onClick: () => { banner.remove(); storage.clearStage(); } }, ['Discard']),
    ]),
  ]);
  const app = document.getElementById('app');
  app.insertBefore(banner, app.querySelector('#welcome'));
  // If the user opens something else instead, drop the banner (the stage gets superseded
  // by the new doc's edits, or cleared on its save).
  on('doc:loaded', () => banner.remove());
}

function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

return { initRecovery };
})();
