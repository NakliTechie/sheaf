<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sheaf — PDF editor</title>
  <meta name="description" content="Browser-native PDF editor. One file. No account, no upload, no telemetry, no limits.">
  <meta name="sheaf-version" content="0.1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; worker-src 'self' blob:; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'">
  <style>
/* ui/theme.css */
/* theme.css — design tokens (nakli-creative-primitives convention). Every colour,
   space, and radius is a custom property; a new theme is one [data-theme] block,
   never a refactor. Dark is the default (high-contrast a11y per handoff §11). */

:root,
:root[data-theme="dark"] {
  --bg:            #14161a;
  --bg-raised:     #1c1f25;
  --bg-sunken:     #0f1114;
  --panel:         #1c1f25;
  --panel-border:  #2b2f37;
  --canvas-bg:     #0b0c0f;

  --fg:            #e7e9ee;
  --fg-muted:      #9aa1ad;
  --fg-faint:      #6b7280;

  --accent:        #5b8cff;
  --accent-fg:     #ffffff;
  --accent-soft:   #21304f;

  --danger:        #ff5c5c;
  --danger-soft:   #3a1f22;
  --warn:          #ffb454;
  --ok:            #4ec98f;

  --page-shadow:   0 2px 14px rgba(0,0,0,.55);
  --overlay:       rgba(8,9,11,.66);

  --r-sm: 5px;  --r-md: 9px;  --r-lg: 14px;
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;  --sp-5: 24px;  --sp-6: 36px;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;

  --toolbar-h: 52px;
  --rail-w: 168px;
  --shadow-pop: 0 10px 40px rgba(0,0,0,.5);
}

:root[data-theme="light"] {
  --bg:            #f4f5f7;
  --bg-raised:     #ffffff;
  --bg-sunken:     #e9ebef;
  --panel:         #ffffff;
  --panel-border:  #d9dce2;
  --canvas-bg:     #cfd3da;

  --fg:            #1a1d23;
  --fg-muted:      #5b626d;
  --fg-faint:      #8b919c;

  --accent:        #2f6bff;
  --accent-fg:     #ffffff;
  --accent-soft:   #dbe6ff;

  --danger:        #d23b3b;
  --danger-soft:   #fbe3e3;
  --warn:          #b9760f;
  --ok:            #1f9d62;

  --page-shadow:   0 2px 12px rgba(20,30,50,.18);
  --overlay:       rgba(20,24,32,.4);
}

* { box-sizing: border-box; }

html, body {
  margin: 0; height: 100%;
  background: var(--bg); color: var(--fg);
  font-family: var(--font); font-size: 14px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

button { font-family: inherit; font-size: inherit; color: inherit; }

.visually-hidden {
  position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }


/* ui/layout.css */
/* layout.css — the shell: toolbar, thumbnail rail, scrolling page viewport, status
   bar, toasts, modals. Dim-never-hide for the canvas/thumb layouts (handoff §8). */

#app { display: flex; flex-direction: column; height: 100%; }

/* ── Toolbar ─────────────────────────────────────────────────────────────────── */
#toolbar {
  height: var(--toolbar-h); flex: 0 0 auto;
  display: flex; align-items: center; gap: var(--sp-2);
  padding: 0 var(--sp-3);
  background: var(--bg-raised); border-bottom: 1px solid var(--panel-border);
  user-select: none;
}
#toolbar .brand { display: flex; align-items: baseline; gap: 6px; margin-right: var(--sp-3); }
#toolbar .brand b { font-size: 16px; letter-spacing: .3px; }
#toolbar .brand .ver { font-size: 11px; color: var(--fg-faint); }
#toolbar .group { display: flex; align-items: center; gap: 4px; }
#toolbar .sep { width: 1px; height: 24px; background: var(--panel-border); margin: 0 var(--sp-1); }
#toolbar .spacer { flex: 1; }
#toolbar .fname { color: var(--fg-muted); font-size: 12px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#toolbar .fname .dot { color: var(--warn); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 10px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid transparent; color: var(--fg);
  cursor: pointer; white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--bg-sunken); }
.btn:disabled { opacity: .38; cursor: default; }
.btn.primary { background: var(--accent); color: var(--accent-fg); }
.btn.primary:hover:not(:disabled) { filter: brightness(1.08); }
.btn.icon { padding: 0; width: 34px; justify-content: center; }
.btn.danger:hover:not(:disabled) { background: var(--danger-soft); color: var(--danger); }
.btn svg { width: 18px; height: 18px; display: block; }
.btn .label { font-size: 13px; }
.btn.tool.active { background: var(--accent); color: var(--accent-fg); }
.color-swatch { width: 28px; height: 28px; padding: 0; border: 1px solid var(--panel-border); border-radius: var(--r-sm); background: none; cursor: pointer; }

/* Annotation drawing: crosshair over pages, live preview overlay. */
#viewport.tool-active .page-wrap { cursor: crosshair; }
#viewport.tool-active .page-wrap canvas { pointer-events: none; }
.annot-preview { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

/* ── Body: rail + viewport ───────────────────────────────────────────────────── */
#body { flex: 1; display: flex; min-height: 0; }

#rail {
  width: var(--rail-w); flex: 0 0 auto;
  background: var(--bg-sunken); border-right: 1px solid var(--panel-border);
  overflow-y: auto; padding: var(--sp-2);
  display: flex; flex-direction: column; gap: var(--sp-2);
}
#rail.hidden { display: none; }
.thumb {
  position: relative; border: 2px solid transparent; border-radius: var(--r-sm);
  background: var(--bg-raised); cursor: pointer; overflow: hidden;
}
.thumb canvas { display: block; width: 100%; height: auto; background: #fff; }
.thumb .pno {
  position: absolute; bottom: 3px; right: 4px; font-size: 10px; color: var(--fg);
  background: var(--overlay); padding: 1px 5px; border-radius: 8px;
}
.thumb.selected { border-color: var(--accent); }
.thumb.current { box-shadow: inset 0 0 0 2px var(--accent-soft); }

#viewport {
  flex: 1; min-width: 0; overflow: auto; background: var(--canvas-bg);
  padding: var(--sp-5) var(--sp-4); display: flex; flex-direction: column;
  align-items: center; gap: var(--sp-5);
}
.page-wrap { position: relative; box-shadow: var(--page-shadow); background: #fff; }
.page-wrap canvas { display: block; }
.page-wrap .badge {
  position: absolute; top: 6px; left: 6px; font-size: 11px; color: var(--fg);
  background: var(--overlay); padding: 2px 7px; border-radius: 8px; pointer-events: none;
}

/* ── Empty / welcome ─────────────────────────────────────────────────────────── */
#welcome {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: var(--sp-4); padding: var(--sp-6);
}
#welcome.hidden { display: none; }
#welcome .drop {
  border: 2px dashed var(--panel-border); border-radius: var(--r-lg);
  padding: var(--sp-6) calc(var(--sp-6) * 1.4); transition: border-color .15s, background .15s;
}
#welcome .drop.over { border-color: var(--accent); background: var(--accent-soft); }
#welcome h1 { font-size: 24px; margin: 0; }
#welcome p { color: var(--fg-muted); max-width: 440px; margin: 0 auto; }
#welcome .actions { display: flex; gap: var(--sp-2); justify-content: center; flex-wrap: wrap; }
#welcome .privacy { font-size: 12px; color: var(--fg-faint); display: flex; align-items: center; gap: 6px; }
#welcome .privacy svg { width: 14px; height: 14px; flex: 0 0 auto; }
#welcome .drop > div:first-child svg { width: 46px; height: 46px; }

/* ── Status bar ──────────────────────────────────────────────────────────────── */
#statusbar {
  height: 28px; flex: 0 0 auto; display: flex; align-items: center; gap: var(--sp-3);
  padding: 0 var(--sp-3); background: var(--bg-raised); border-top: 1px solid var(--panel-border);
  font-size: 12px; color: var(--fg-muted);
}
#statusbar .spacer { flex: 1; }
#statusbar .zoom { display: flex; align-items: center; gap: 4px; }
#statusbar button { background: none; border: none; color: var(--fg-muted); cursor: pointer; padding: 2px 5px; border-radius: 4px; }
#statusbar button:hover { background: var(--bg-sunken); color: var(--fg); }

/* ── Toasts ──────────────────────────────────────────────────────────────────── */
#toasts {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: var(--sp-2); z-index: 60; align-items: center;
}
.toast {
  padding: 10px 16px; border-radius: var(--r-md); background: var(--panel);
  border: 1px solid var(--panel-border); box-shadow: var(--shadow-pop);
  max-width: 70vw; animation: toast-in .18s ease-out;
}
.toast.err { border-color: var(--danger); }
.toast.warn { border-color: var(--warn); }
.toast.ok { border-color: var(--ok); }
.toast .detail { display: block; font-size: 12px; color: var(--fg-muted); margin-top: 3px; }
@keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Modal ───────────────────────────────────────────────────────────────────── */
#modal-root { position: fixed; inset: 0; z-index: 80; display: none; }
#modal-root.open { display: block; }
#modal-root .scrim { position: absolute; inset: 0; background: var(--overlay); }
#modal-root .modal {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--panel); border: 1px solid var(--panel-border); border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop); min-width: 360px; max-width: 560px; max-height: 80vh; overflow: auto;
}
#modal-root .modal h2 { margin: 0; padding: var(--sp-4); border-bottom: 1px solid var(--panel-border); font-size: 16px; }
#modal-root .modal .body { padding: var(--sp-4); display: flex; flex-direction: column; gap: var(--sp-3); }
#modal-root .modal .body label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--fg-muted); }
#modal-root .modal .body input, #modal-root .modal .body select {
  background: var(--bg-sunken); border: 1px solid var(--panel-border); color: var(--fg);
  border-radius: var(--r-sm); padding: 8px 10px; font-size: 14px;
}
#modal-root .modal .row { display: flex; gap: var(--sp-2); }
#modal-root .modal .foot { display: flex; justify-content: flex-end; gap: var(--sp-2); padding: var(--sp-4); border-top: 1px solid var(--panel-border); }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: var(--sp-3); }
.setting-row .desc { font-size: 12px; color: var(--fg-faint); }

/* ── Compat warning ──────────────────────────────────────────────────────────── */
#compat { display: none; padding: var(--sp-6); text-align: center; }
#compat.show { display: block; }

#loading-bar {
  position: fixed; top: 0; left: 0; height: 2px; background: var(--accent);
  width: 0; transition: width .2s; z-index: 90;
}

</style>
</head>
<body>
  <div id="loading-bar"></div>
  <div id="app" data-version="0.1.0">

    <div id="compat">
      <h1>Sheaf needs a modern browser</h1>
      <p>Sheaf uses the File System Access API, IndexedDB, and WebCrypto. Please use a recent Chromium browser (Chrome / Edge / Brave / Arc) for the full experience, or a current Firefox / Safari for open-and-download mode.</p>
    </div>

    <div id="toolbar" role="toolbar" aria-label="Main toolbar"></div>

    <div id="welcome" role="main" aria-label="Open a PDF to get started"></div>

    <div id="body" class="hidden">
      <div id="rail" role="listbox" aria-label="Page thumbnails"></div>
      <div id="viewport" role="application" aria-label="PDF pages" tabindex="0"></div>
    </div>

    <div id="statusbar" role="status" aria-live="polite"></div>
  </div>

  <div id="toasts" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-root" aria-live="polite"></div>

  
<script type="module">
/* core/engines.js */
const __m_core_engines = (() => {
// engines.js — vendored-engine loader. Probe → lazy-load on first use → verify
// SHA-256 → cache. Fail loud on mismatch. No runtime CDN; everything is served
// same-origin from /engines. Never surprise-download multi-MB assets — callers
// gate the first load behind an explicit action.
//
// Engines are dependency-injected so the deterministic core stays testable:
// the browser bootstrap calls loadEngine(); a Node test calls registerEngine()
// with a directly-imported module. Either way ops read engines via getEngine().

// The pin manifest. Paths are relative to ENGINES_BASE; sha256 is verified before
// the module is allowed to execute. Bump version + sha together, never one alone.
const MANIFEST = {
  'pdf-lib': {
    version: '1.17.1',
    path: 'pdf-lib/1.17.1/pdf-lib.esm.js',
    sha256: '4bd8dd3155d7b1062a161567bf68168c55283bd5fad6a638b16ae028846b52c5',
    sizeHint: '1.5 MB',
  },
  'pdfjs': {
    version: '4.10.38',
    path: 'pdfjs/4.10.38/pdf.min.mjs',
    sha256: '27fc2a057a00f92a4334ad06e17dbd7259912954e9fb7f76400bcca5fd190a9c',
    sizeHint: '350 KB',
    worker: {
      path: 'pdfjs/4.10.38/pdf.worker.min.mjs',
      sha256: '1baa1844c89c80a5b2797c916e75ab29254be46d8e9cb53cb6364d7aad84be36',
    },
  },
};

let BASE = '/engines';
function setEnginesBase(p) { BASE = p.replace(/\/$/, ''); }
function enginesBase() { return BASE; }

const _loaded = new Map();   // name -> module
const _loading = new Map();  // name -> Promise

function registerEngine(name, mod) { _loaded.set(name, mod); }
function getEngine(name) {
  const m = _loaded.get(name);
  if (!m) throw new Error(`Engine "${name}" not loaded — call loadEngine() first`);
  return m;
}
function isLoaded(name) { return _loaded.has(name); }

async function sha256Hex(buf) {
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// Fetch the vendored file, verify its hash, then import it. The verify-then-import
// uses a same-origin re-fetch (served from cache); the hash is a tamper tripwire on
// the vendored bundle, not an anti-MITM measure (same-origin already gives us that).
async function loadEngine(name) {
  if (_loaded.has(name)) return _loaded.get(name);
  if (_loading.has(name)) return _loading.get(name);

  const entry = MANIFEST[name];
  if (!entry) throw new Error(`Unknown engine "${name}"`);

  const p = (async () => {
    const url = `${BASE}/${entry.path}`;
    let bytes;
    try {
      const res = await fetch(url, { cache: 'force-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      bytes = await res.arrayBuffer();
    } catch (err) {
      throw new Error(`Engine "${name}" failed to load from ${url}: ${err.message}`);
    }
    const got = await sha256Hex(bytes);
    if (got !== entry.sha256) {
      throw new Error(`Engine "${name}" integrity check FAILED — expected ${entry.sha256}, got ${got}. Refusing to load a tampered bundle.`);
    }
    const mod = await import(/* @vite-ignore */ url);
    _loaded.set(name, mod);
    return mod;
  })();

  _loading.set(name, p);
  try { return await p; }
  finally { _loading.delete(name); }
}

// PDF.js needs its worker pinned too. Returns the same-origin worker URL after the
// engine is loaded; the caller assigns GlobalWorkerOptions.workerSrc.
function pdfjsWorkerUrl() {
  return `${BASE}/${MANIFEST.pdfjs.worker.path}`;
}

return { MANIFEST, setEnginesBase, enginesBase, registerEngine, getEngine, isLoaded, loadEngine, pdfjsWorkerUrl };
})();

/* core/history.js */
const __m_core_history = (() => {
// history.js — the op-log + periodic snapshots that make replay possible.
//
// Sheaf's M0 gate: "event-log replay reconstructs state." State is the document.
// We log every committed op; we snapshot the serialized PDF bytes every N ops.
// To reach pointer P we load the nearest snapshot at/below P and re-run the ops
// after it. Undo/redo and crash-restore are the SAME walk — one mechanism.
//
// Same shape as Slate's history (suite convention); the snapshot payload is PDF
// bytes (Uint8Array) instead of an ImageData.

const MAX_STEPS = 80;
const SNAPSHOT_INTERVAL = 8;

class History {
  constructor() {
    this._ops = [];      // [{ op, params }]
    this._snaps = [];    // [{ pointer, bytes }]   pointer -1 snap = the originally-opened bytes
    this._pointer = -1;  // -1 = original document, pre-any-op
  }

  // Record an op at the tip, truncating any redo branch. Returns the new pointer.
  push(op, params) {
    this._ops = this._ops.slice(0, this._pointer + 1);
    this._snaps = this._snaps.filter(s => s.pointer <= this._pointer);
    this._ops.push({ op, params });

    if (this._ops.length > MAX_STEPS) {
      const removed = this._ops.length - MAX_STEPS;
      this._ops = this._ops.slice(removed);
      this._snaps = this._snaps
        .filter(s => s.pointer >= removed)
        .map(s => ({ ...s, pointer: s.pointer - removed }));
      this._pointer = Math.max(-1, this._pointer - removed);
    }
    this._pointer = this._ops.length - 1;
    return this._pointer;
  }

  // Snapshot the document bytes at a pointer. The -1 (original) snapshot is always
  // kept regardless of interval — it's the replay floor. Others land on the interval.
  saveSnapshot(pointer, bytes) {
    if (pointer !== -1 && pointer % SNAPSHOT_INTERVAL !== 0) return;
    this._snaps = this._snaps.filter(s => s.pointer !== pointer);
    this._snaps.push({ pointer, bytes });
  }

  // The plan to reach targetPointer: the nearest snapshot at/below it + the ops
  // that must be re-run after that snapshot.
  getReplayPlan(targetPointer) {
    const snap = this._snaps
      .filter(s => s.pointer <= targetPointer)
      .sort((a, b) => b.pointer - a.pointer)[0] ?? null;
    const startPointer = snap ? snap.pointer : -1;
    const ops = this._ops.slice(startPointer + 1, targetPointer + 1);
    return { snap, ops };
  }

  // The full op log up to and including the current pointer (for export as a
  // re-runnable pipeline — the sovereign-artifact thesis, Bench §5).
  opsUpToPointer(pointer = this._pointer) {
    return this._ops.slice(0, pointer + 1).map(({ op, params }) => ({ op, params }));
  }

  canUndo() { return this._pointer >= 0; }
  canRedo() { return this._pointer < this._ops.length - 1; }
  stepBack() { if (!this.canUndo()) return false; this._pointer--; return true; }
  stepForward() { if (!this.canRedo()) return false; this._pointer++; return true; }

  get pointer() { return this._pointer; }
  get size() { return this._ops.length; }
  peek(pointer = this._pointer) { return this._ops[pointer] ?? null; }

  clear() { this._ops = []; this._snaps = []; this._pointer = -1; }
}

return { History };
})();

/* core/events.js */
const __m_core_events = (() => {
// events.js — the suite event bus (nakli-creative-primitives convention).
// A tiny synchronous pub/sub. One bus per tab; modules talk through topics, never
// by reaching into each other. Lifted from the shared primitive so tools 2–5 see
// the same shape.

const _bus = new Map();

function on(type, fn) {
  if (!_bus.has(type)) _bus.set(type, new Set());
  _bus.get(type).add(fn);
  return () => off(type, fn);
}

function off(type, fn) {
  _bus.get(type)?.delete(fn);
}

function once(type, fn) {
  const wrapper = (data) => { off(type, wrapper); fn(data); };
  on(type, wrapper);
}

function emit(type, data) {
  // Copy the listener set so a handler that subscribes/unsubscribes mid-emit
  // doesn't corrupt the iteration.
  const set = _bus.get(type);
  if (!set) return;
  for (const fn of [...set]) {
    try { fn(data); }
    catch (err) { console.error(`[events] handler for "${type}" threw:`, err); }
  }
}

return { on, off, once, emit };
})();

/* core/state.js */
const __m_core_state = (() => {
// state.js — the single document-state shape + UI preferences.
//
// One mutable `state` object the whole app reads. The open document is a SheafDoc
// (or null). History is the op-log. Preferences persist to localStorage — and ONLY
// preferences: never PDF content, page bytes, extracted text, or form values. Those
// live in memory and, at most, in OPFS crash-staging (storage.js) — never here.

const History = __m_core_history.History;
const emit = __m_core_events.emit;
const on = __m_core_events.on;

const state = {
  session: {
    source: null,        // 'fsa' | 'picker' | 'dragdrop' | 'url' | 'restore' | null
    fileHandle: null,    // FileSystemFileHandle when opened via FSA (for save-in-place)
    folderHandle: null,  // FileSystemDirectoryHandle for folder mode / sidecar saves
    fileName: null,      // pinned on first save; never re-derived from a mutable title
    files: [],           // folder mode: [{ handle, name, size }]
    currentIndex: 0,
  },
  doc: null,             // SheafDoc | null — the open document object
  view: {
    pageIndex: 0,        // active page (paginated mode) / scroll anchor (continuous)
    zoom: 1.0,
    fitMode: 'width',    // 'width' | 'page' | 'actual' | 'custom'
    mode: 'continuous',  // 'continuous' | 'paginated'
  },
  selection: {
    pages: [],           // selected page indices (thumbnail multi-select)
    region: null,        // { page, x, y, w, h } in PDF units — for redact/annotate
  },
  activeTool: null,
  history: new History(),
  dirty: false,          // unsaved changes since last save/open
  dev: {
    agentFace: false,    // window.sheaf is OFF by default — opt-in developer setting
  },
};

// ── Preferences (localStorage; UI only) ────────────────────────────────────────

const PREFS_KEY = 'sheaf.v1.prefs';

function loadPrefs() {
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.theme) document.documentElement.setAttribute('data-theme', p.theme);
    if (p.viewMode === 'continuous' || p.viewMode === 'paginated') state.view.mode = p.viewMode;
    if (typeof p.fitMode === 'string') state.view.fitMode = p.fitMode;
    if (typeof p.agentFace === 'boolean') state.dev.agentFace = p.agentFace;
  } catch {}
}

function savePrefs() {
  try {
    localStorage.setItem(PREFS_KEY, JSON.stringify({
      theme: document.documentElement.getAttribute('data-theme') || 'dark',
      viewMode: state.view.mode,

const __m_core_keyboard = (() => {
// keyboard.js — KeyboardGrammar (nakli-creative-primitives convention). Register
// combos with a context; the dispatcher resolves which binding wins. The suite
// shares this so every tool's shortcuts read the same way.
//
// THE S-COLLISION, RESOLVED (handoff §12): "save" and "strike" both want S.
//   • mod+s  → Save        — context 'global', always wins (has a modifier).
//   • s      → Strike tool — context 'viewer', bare key, fires ONLY when a viewer
//                            has focus and the user is not typing in a field.
// A modifier'd combo and a bare key never collide because they normalize to
// different strings ('mod+s' vs 's'). The remaining risk — a bare 's' captured
// while typing — is removed by the editable-target guard below.

function isEditable(el) {
  if (!el) return false;
  const tag = el.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
}

// Normalize a KeyboardEvent to a combo string: '[mod+][shift+][alt+]key'.
// mod = Cmd on macOS, Ctrl elsewhere.
function comboOf(ev) {
  const parts = [];
  if (ev.metaKey || ev.ctrlKey) parts.push('mod');
  if (ev.shiftKey) parts.push('shift');
  if (ev.altKey) parts.push('alt');
  let k = ev.key;
  if (k === ' ') k = 'space';
  else if (k.length === 1) k = k.toLowerCase();
  else k = k.toLowerCase(); // 'ArrowDown' -> 'arrowdown', 'Escape' -> 'escape'
  parts.push(k);
  return parts.join('+');
}

class KeyboardGrammar {
  constructor() {
    this._bindings = new Map();    // combo -> [{ handler, context, when, label }]
    this._contextResolver = () => ['global'];
    this._enabled = true;
  }

  // contextResolver returns the active contexts, most-specific first. A binding
  // matches if its context is active. 'global' bindings are the fallback.
  setContextResolver(fn) { this._contextResolver = fn; }
  enable(v = true) { this._enabled = v; }

  register(combo, handler, { context = 'global', when = null, label = '', description = '' } = {}) {
    const norm = combo.toLowerCase();
    if (!this._bindings.has(norm)) this._bindings.set(norm, []);
    this._bindings.get(norm).push({ handler, context, when, label, description });
    return this;
  }

  // The list for a help panel (suite /guide reads this).
  list() {
    const out = [];
    for (const [combo, binds] of this._bindings) for (const b of binds) out.push({ combo, ...b });
    return out;
  }

  attach(target = window) {
    target.addEventListener('keydown', (ev) => this._onKey(ev));
    return this;
  }

  _onKey(ev) {
    if (!this._enabled) return;
    const combo = comboOf(ev);
    const binds = this._bindings.get(combo);
    if (!binds || !binds.length) return;

    const hasModifier = ev.metaKey || ev.ctrlKey;
    // Bare keys must not fire while typing.
    if (!hasModifier && isEditable(ev.target)) return;

    const active = this._contextResolver();
    const order = [...active, 'global'];
    // Pick the most-specific active context that has a matching binding whose
    // `when` predicate (if any) passes.
    for (const ctx of order) {
      const match = binds.find(b => b.context === ctx && (!b.when || b.when(ev)));
      if (match) {
        ev.preventDefault();
        match.handler(ev);
        return;
      }
    }
  }
}

const keyboard = new KeyboardGrammar();

return { KeyboardGrammar, keyboard };
})();

const __m_core_runner = (() => {
// runner.js — the dispatch + replay engine. The single path every operation takes,
// no matter which door it came through (UI click, window.sheaf call, conductor brief).
//
//   dispatch(id, params, {source})  validate params → run op → install result → log
//   undo() / redo()                 walk the op-log via nearest snapshot
//   replayFromFloor()               re-run the WHOLE log from the origin (the M0 gate)
//   exportPipeline()                the op-log as a re-runnable, model-free artifact
//
// Document-mutating ops return { doc }; artifact ops (convert, extract) return
// { artifact } and are not recorded — they don't change document state.

const state = __m_core_state.state;
const markDirty = __m_core_state.markDirty;
const getOp = __m_core_registry.get;
const validateParams = __m_core_schema.validateParams;
const SheafDoc = __m_core_doc.SheafDoc;
const emit = __m_core_events.emit;

// Seed the replay floor when a document opens. The -1 snapshot is the bytes the
// user opened; every replay starts here. Open ops call this, not the op-log.
function seedFloor(openedBytes) {
  state.history.clear();
  state.history.saveSnapshot(-1, openedBytes);
  emit('history:changed', historyStatus());
}

async function dispatch(id, params = {}, { source = 'ui', record = true } = {}) {
  const op = getOp(id);
  if (!op) throw new Error(`Unknown operation: ${id}`);

  // The single ingress: coerce + validate params before the op sees them.
  const clean = validateParams(op.params, params);

  // Open ops may run with no current doc; everything else needs one.
  if (op.group !== 'open' && !state.doc) throw new Error(`No document open for "${id}"`);

  if (op.group !== 'open') {
    // Mutating/artifact op on the current doc. runAndNormalize re-parses the result
    // from its own bytes so getPages()/getPageCount()/metadata are always consistent
    // (pdf-lib's getPages() cache can go stale after in-place removePage/insertPage)
    // and so the in-memory doc, the snapshot, and what the renderer derives are the
    // same byte representation. Costs one re-parse per op — correctness over micro-perf.
    const r = await runAndNormalize(state.doc, op, clean);
    if ('artifact' in r) { emit('op:artifact', { id, source }); return { ok: true, artifact: r.artifact }; }
    state.doc = r.doc;
    if (record) {
      const pointer = state.history.push(id, clean);
      state.history.saveSnapshot(pointer, r.bytes);
      emit('history:changed', historyStatus());
    }
    markDirty(true);
    emit('doc:changed', { id, source });
    return { ok: true, doc: r.doc };
  }

  // Open op: a fresh document. Reset history + view + selection, seed the floor.
  const newDoc = result_open(await op.run(state.doc, clean), id);
  state.doc = await newDoc;
  seedFloor(await state.doc.toBytes());
  state.view.pageIndex = 0;
  state.selection = { pages: [], region: null };
  state.activeTool = null;
  markDirty(false);
  emit('doc:loaded', { id, source, pageCount: state.doc.pageCount() });
  return { ok: true, doc: state.doc };
}

// Helper: validate an open op's result is a doc.
function result_open(result, id) {
  const d = result?.doc;
  if (!(d instanceof SheafDoc)) throw new Error(`Open op "${id}" must return { doc }`);
  return d;
}

// Run an op and, if it mutates, normalize the result through its bytes. Returns
// { doc, bytes } for mutating ops or { artifact } for artifact ops. The single place
// ops are executed against a doc — dispatch and replay both go through it, so the live
// path and the replay path are byte-for-byte identical.
async function runAndNormalize(doc, op, params) {
  const res = await op.run(doc, params);
  if (op.mutates === false) return { artifact: res?.artifact ?? null };
  const out = res?.doc;
  if (!(out instanceof SheafDoc)) throw new Error(`Op "${op.id}" must return { doc } but did not`);
  const bytes = await out.toBytes();
  return { doc: await SheafDoc.fromBytes(bytes, { validate: false }), bytes };

// Rebuild the document at a target pointer from the nearest snapshot + replayed ops.
// Shared by undo and redo.
async function applyToPointer(target) {
  const { snap, ops } = state.history.getReplayPlan(target);
  if (!snap) throw new Error('No snapshot floor — document was not opened through the runner');
  let doc = await SheafDoc.fromBytes(snap.bytes, { validate: false });
  for (const { op, params } of ops) {
    const def = getOp(op);
    if (!def) throw new Error(`Replay hit unknown op "${op}"`);
    doc = (await runAndNormalize(doc, def, params)).doc;

}

async function undo() {

}

async function redo() {

// return the reconstructed document. If its fingerprint equals the live document's,
// the event log fully reconstructs state.
async function replayFromFloor() {

          el('span', { text: d, style: 'color:var(--fg-muted)' }),

  ]);

// Prefer the live grammar; fall back to a static list if nothing registered yet.
function shortcutRows() {
  const live = keyboard.list().filter(b => b.label).map(b => [prettyCombo(b.combo), b.label]);
  if (live.length) return live;
  return [
    ['⌘O', 'Open'], ['⌘S', 'Save'], ['⌘⇧S', 'Save as'],
    ['⌘Z', 'Undo'], ['⌘⇧Z', 'Redo'],
    ['+ / -', 'Zoom in / out'], ['0', 'Fit width'],
    ['?', 'Help'], ['Esc', 'Close dialog'],
  ];
}

function prettyCombo(combo) {
  const mac = navigator.platform.toLowerCase().includes('mac');
  return combo.split('+').map(p => ({
    mod: mac ? '⌘' : 'Ctrl', shift: '⇧', alt: mac ? '⌥' : 'Alt',
    arrowup: '↑', arrowdown: '↓', arrowleft: '←', arrowright: '→', escape: 'Esc',
  }[p] || p.toUpperCase())).join(mac ? '' : '+');
}

return { openHelp };
})();

/* ui/annotate-tools.js */
const __m_ui_annotate_tools = (() => {
// annotate-tools.js — the interactive annotation layer. When a tool is active, a
// pointer gesture on a page becomes normalized (0..1) coordinates and dispatches an
// annotate.* op through the one runner. A live preview overlay shows the shape mid-
// gesture; the committed draw comes back through the normal render path.

const state = __m_core_state.state;
const on = __m_core_events.on;
const emit = __m_core_events.emit;
const dispatch = __m_core_runner.dispatch;
const el = __m_ui_dom.el;
const formModal = __m_ui_modal.formModal;

const DRAG_TOOLS = new Set(['highlight', 'rect', 'line', 'pencil']);
const ALL_TOOLS = new Set([...DRAG_TOOLS, 'text']);

const toolSettings = { color: '#ff3b30', highlightColor: '#ffe14d', thickness: 2 };

let viewport = null;
let active = null;
let gesture = null;
let preview = null;

function currentTool() { return active; }

function setTool(tool) {
  active = ALL_TOOLS.has(tool) ? tool : null;
  state.activeTool = active;
  viewport.classList.toggle('tool-active', !!active);
  emit('tool:changed', { tool: active });
}

function initAnnotateTools() {
  viewport = document.getElementById('viewport');
  viewport.addEventListener('pointerdown', onDown);
  // A fresh document clears the active tool.
  on('doc:loaded', () => setTool(null));
}

function wrapUnder(target) { return target?.closest?.('.page-wrap'); }

function normalize(rect, clientX, clientY) {
  return {
    x: Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)),
    y: Math.max(0, Math.min(1, (clientY - rect.top) / rect.height)),
  };
}

async function onDown(e) {
  if (!active) return;
  const wrap = wrapUnder(e.target);
  if (!wrap) return;
  const canvas = wrap.querySelector('canvas');
  const rect = canvas.getBoundingClientRect();
  const page = Number(wrap.dataset.page);

  if (active === 'text') {
    const at = normalize(rect, e.clientX, e.clientY);
    const v = await formModal('Text box', [
      { name: 'text', label: 'Text', value: '' },
      { name: 'fontSize', label: 'Size (pt)', type: 'number', value: 14 },
    ]);
    if (v?.text) dispatch('annotate.textbox', { page, x: at.x, y: at.y, text: v.text, fontSize: v.fontSize, color: toolSettings.color });
    return;
  }

  e.preventDefault();
  const start = normalize(rect, e.clientX, e.clientY);
  gesture = { wrap, page, rect, start, cur: null, points: [start] };
  preview = el('div', { class: 'annot-preview' });
  wrap.style.position = 'relative';
  wrap.appendChild(preview);
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp, { once: true });
}

function onMove(e) {
  if (!gesture) return;
  gesture.cur = normalize(gesture.rect, e.clientX, e.clientY);
  gesture.points.push(gesture.cur);
  drawPreview();
}

function drawPreview() {
  const { start, cur, points } = gesture;
  if (active === 'pencil') {
    const d = points.map((p, i) => `${i ? 'L' : 'M'}${(p.x * 100).toFixed(2)} ${(p.y * 100).toFixed(2)}`).join(' ');
    preview.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%"><path d="${d}" fill="none" stroke="${toolSettings.color}" stroke-width="0.4"/></svg>`;
    return;
  }
  if (!cur) return;
  if (active === 'highlight' || active === 'rect') {
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    const style = active === 'highlight'
      ? `background:${toolSettings.highlightColor};opacity:.4`
      : `border:2px solid ${toolSettings.color}`;
    preview.innerHTML = `<div style="position:absolute;left:${x * 100}%;top:${y * 100}%;width:${w * 100}%;height:${h * 100}%;${style}"></div>`;
  } else if (active === 'line') {
    preview.innerHTML = `<svg style="position:absolute;inset:0;width:100%;height:100%"><line x1="${start.x * 100}%" y1="${start.y * 100}%" x2="${cur.x * 100}%" y2="${cur.y * 100}%" stroke="${toolSettings.color}" stroke-width="2"/></svg>`;
  }
}

function onUp() {
  window.removeEventListener('pointermove', onMove);
  if (!gesture) return;
  const g = gesture; gesture = null;
  if (preview) { preview.remove(); preview = null; }
  const { start, cur, points, page } = g;

  if (active === 'highlight' || active === 'rect') {
    if (!cur) return;
    const x = Math.min(start.x, cur.x), y = Math.min(start.y, cur.y), w = Math.abs(cur.x - start.x), h = Math.abs(cur.y - start.y);
    if (w < 0.005 || h < 0.005) return; // ignore stray clicks
    if (active === 'highlight') dispatch('annotate.highlight', { page, x, y, w, h, color: toolSettings.highlightColor });
    else dispatch('annotate.rect', { page, x, y, w, h, color: toolSettings.color, thickness: toolSettings.thickness });
  } else if (active === 'line') {
    if (!cur) return;
    dispatch('annotate.line', { page, x1: start.x, y1: start.y, x2: cur.x, y2: cur.y, color: toolSettings.color, thickness: toolSettings.thickness });
  } else if (active === 'pencil') {
    if (points.length >= 2) dispatch('annotate.pencil', { page, points, color: toolSettings.color, thickness: toolSettings.thickness });
  }
}

return { toolSettings, currentTool, setTool, initAnnotateTools };
})();

/* ui/toolbar.js */
const __m_ui_toolbar = (() => {
// toolbar.js — the top chrome. Buttons dispatch through the runner (the same door
// the agent face uses). Page ops act on the selected pages, or the current page when
// nothing is selected. Buttons that need a document disable when none is open.

const el = __m_ui_dom.el;
const clear = __m_ui_dom.clear;
const icon = __m_ui_icons.icon;
const state = __m_core_state.state;
const on = __m_core_events.on;
const emit = __m_core_events.emit;
const dispatch = __m_core_runner.dispatch;
const undo = __m_core_runner.undo;
const redo = __m_core_runner.redo;
const historyStatus = __m_core_runner.historyStatus;
const savePrefs = __m_core_state.savePrefs;
const selectedPages = __m_ui_thumbs.selectedPages;
const confirmModal = __m_ui_modal.confirmModal;
const formModal = __m_ui_modal.formModal;
const toast = __m_ui_toast.toast;
const openPdf = __m_ui_fileops.openPdf;
const newBlank = __m_ui_fileops.newBlank;
const savePdf = __m_ui_fileops.savePdf;
const savePdfAs = __m_ui_fileops.savePdfAs;
const mergePdf = __m_ui_fileops.mergePdf;
const openSettings = __m_ui_settings.openSettings;
const openHelp = __m_ui_help.openHelp;
const openMarksMenu = __m_ui_marksmenu.openMarksMenu;
const setTool = __m_ui_annotate_tools.setTool;
const currentTool = __m_ui_annotate_tools.currentTool;
const toolSettings = __m_ui_annotate_tools.toolSettings;

let bar = null;
const need = [];   // buttons needing a document

function targetPages() {
  const sel = selectedPages();
  return sel.length ? sel : [state.view.pageIndex];
}

function btn(iconName, label, onClick, { needsDoc = false, danger = false, id = '' } = {}) {
  const b = el('button', {
    class: `btn ${danger ? 'danger' : ''} ${label ? '' : 'icon'}`,
    title: label || iconName, 'aria-label': label || iconName, onClick, id,
  }, [el('span', { html: icon(iconName) }), label ? el('span.label', { text: label }) : null].filter(Boolean));
  if (needsDoc) need.push(b);
  return b;
}

// Annotation tool toggle button. tool === null → the select/cursor (clears the tool).
function toolBtn(iconName, tool, label) {
  const b = el('button', {
    class: 'btn icon tool', title: label, 'aria-label': label, 'aria-pressed': 'false',
    dataset: { tool: tool || 'cursor' },
    onClick: () => setTool(currentTool() === tool ? null : tool),
  }, [el('span', { html: icon(iconName) })]);
  need.push(b);
  return b;
}

function initToolbar() {
  bar = document.getElementById('toolbar');
  const v = document.getElementById('app').dataset.version || '';
  render(v);

  on('doc:loaded', refresh);
  on('doc:closed', refresh);
  on('session:changed', refresh);
  on('history:changed', refresh);
  on('dirty:changed', refresh);
  on('tool:changed', ({ tool }) => reflectTool(tool));
  refresh();
}

function reflectTool(tool) {
  if (!toolsGroup) return;
  for (const b of toolsGroup.querySelectorAll('button.tool')) {
    const isActive = b.dataset.tool === (tool || 'cursor');
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-pressed', String(isActive));
  }
}

function render(version) {
  clear(bar).append(
    el('div.brand', {}, [el('b', { text: 'Sheaf' }), el('span.ver', { text: `v${version}` })]),

    el('div.group', {}, [
      btn('open', 'Open', openPdf),
      btn('new', '', newBlank, { id: 'btn-new' }),
    ]),
    el('div.sep'),
    el('div.group', {}, [
      btn('save', 'Save', savePdf, { needsDoc: true }),
      btn('saveas', '', savePdfAs, { needsDoc: true }),
    ]),
    el('div.sep'),
    el('div.group', {}, [
      (undoBtn = btn('undo', '', () => undo(), { needsDoc: true })),
      (redoBtn = btn('redo', '', () => redo(), { needsDoc: true })),
    ]),
    el('div.sep'),
    el('div.group', {}, [
      btn('rotate', '', () => dispatch('pages.rotate', { pages: targetPages(), angle: 90 }), { needsDoc: true }),
      btn('trash', '', onDelete, { needsDoc: true, danger: true }),
      btn('copy', '', () => dispatch('pages.duplicate', { pages: targetPages() }), { needsDoc: true }),
      btn('insert', '', onInsert, { needsDoc: true }),
      btn('scale', '', onScale, { needsDoc: true }),
      btn('merge', '', mergePdf, { needsDoc: true }),
      btn('mark', '', openMarksMenu, { needsDoc: true }),
      btn('info', '', onMetadata, { needsDoc: true }),
    ]),
    el('div.sep'),
    (toolsGroup = el('div.group', {}, [
      toolBtn('cursor', null, 'Select'),
      toolBtn('highlight', 'highlight', 'Highlight'),
      toolBtn('square', 'rect', 'Rectangle'),
      toolBtn('line', 'line', 'Line'),
      toolBtn('pencil', 'pencil', 'Draw'),
      toolBtn('textbox', 'text', 'Text'),
      el('input', { type: 'color', value: toolSettings.color, title: 'Annotation colour', class: 'color-swatch',
        onInput: (e) => { toolSettings.color = e.target.value; } }),
    ])),

    el('div.spacer'),
    (fname = el('div.fname', { text: '' })),
    el('div.sep'),
    el('div.group', {}, [
      btn(document.documentElement.getAttribute('data-theme') === 'light' ? 'moon' : 'sun', '', toggleTheme, { id: 'btn-theme' }),
      btn('settings', '', openSettings),
      btn('help', '', openHelp),
    ]),
  );
}

let undoBtn, redoBtn, fname, toolsGroup;

function refresh() {
  const open = !!state.doc;
  for (const b of need) b.disabled = !open;
  if (undoBtn && redoBtn) { const h = historyStatus(); undoBtn.disabled = !h.canUndo; redoBtn.disabled = !h.canRedo; }
  if (fname) {
    const name = state.session.fileName;
    clear(fname);
    if (name) { fname.append(name); if (state.dirty) fname.append(el('span.dot', { text: ' ●', title: 'Unsaved changes' })); }
  }
}

async function onDelete() {
  const pages = targetPages();
  if (pages.length >= state.doc.pageCount()) return toast('Cannot delete every page', 'warn');
  const ok = await confirmModal(`Delete ${pages.length} page${pages.length > 1 ? 's' : ''}? This removes them from the document.`, { title: 'Delete pages', okLabel: 'Delete', danger: true });
  if (ok) dispatch('pages.delete', { pages });
}

async function onInsert() {
  const at = Math.min(state.view.pageIndex + 1, state.doc.pageCount());
  await dispatch('pages.insertBlank', { at });
  toast(`Inserted a blank page at ${at + 1}`, 'ok');
}

async function onScale() {
  const v = await formModal('Scale pages', [
    { name: 'factor', label: 'Scale factor (1 = unchanged)', type: 'number', value: 1, min: 0.05, max: 20 },
  ]);
  if (v && v.factor) dispatch('pages.scale', { pages: targetPages(), factor: v.factor });
}

async function onMetadata() {
  const m = state.doc.getMetadata();
  const v = await formModal('Edit metadata', [
    { name: 'title', label: 'Title', value: m.title || '' },
    { name: 'author', label: 'Author', value: m.author || '' },
    { name: 'subject', label: 'Subject', value: m.subject || '' },
    { name: 'keywords', label: 'Keywords (comma-separated)', value: m.keywords || '' },
  ]);
  if (v) dispatch('metadata.set', v);
}

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  const next = cur === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  savePrefs();
  const tb = document.getElementById('btn-theme');
  if (tb) tb.querySelector('span').innerHTML = icon(next === 'light' ? 'moon' : 'sun');
}

return { initToolbar };
})();

const __m_ui_welcome = (() => {
// welcome.js — the empty state. A drag-drop target, Open / New actions, recent
// files (re-opened via stored FSA handles after a permission re-grant), and the
// privacy line. Shown whenever no document is open; the `?` help stays reachable.

const el = __m_ui_dom.el;
const clear = __m_ui_dom.clear;
const icon = __m_ui_icons.icon;
const on = __m_core_events.on;
const emit = __m_core_events.emit;
const state = __m_core_state.state;
const storage = __m_core_storage;
const openPdf = __m_ui_fileops.openPdf;
const newBlank = __m_ui_fileops.newBlank;
const openBytes = __m_ui_fileops.openBytes;
const ensurePdfLib = __m_ui_engines_ui.ensurePdfLib;
const toast = __m_ui_toast.toast;

let welcome = null, body = null;

function initWelcome() {
  welcome = document.getElementById('welcome');
  body = document.getElementById('body');
  render();
  on('doc:loaded', updateVisibility);
  on('doc:closed', () => { updateVisibility(); render(); });
  updateVisibility();
  wireGlobalDrop();
}

function updateVisibility() {
  const open = !!state.doc;
  welcome.classList.toggle('hidden', open);
  body.classList.toggle('hidden', !open);
}

async function render() {
  const drop = el('div.drop', {}, [
    el('div', { html: icon('pages'), style: 'width:46px;height:46px;margin:0 auto;color:var(--fg-faint)' }),
    el('h1', { text: 'Open a PDF to start' }),
    el('p', { text: 'Drag a PDF here, or open one from your disk. It is edited entirely in this tab and saved back to your file — nothing is uploaded.' }),
    el('div.actions', {}, [
      el('button', { class: 'btn primary', onClick: openPdf }, [el('span', { html: icon('open') }), el('span.label', { text: 'Open PDF' })]),
      el('button', { class: 'btn', onClick: newBlank }, [el('span', { html: icon('new') }), el('span.label', { text: 'New blank' })]),
    ]),
    el('div.privacy', { html: `${icon('moon')} <span>No account · no upload · no telemetry · works offline</span>`, style: 'justify-content:center;margin-top:4px' }),
  ]);
  clear(welcome).append(drop);
  renderRecent();
}

async function renderRecent() {
  try {
    const recents = await storage.recentHandles();
    if (!recents.length) return;
    const list = el('div', { style: 'margin-top:8px;font-size:13px' }, [
      el('div', { text: 'Recent', style: 'color:var(--fg-faint);margin-bottom:6px' }),
      el('div', { style: 'display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px' },
        recents.slice(0, 6).map(r => el('button', {
          class: 'btn', style: 'font-size:12px',
          title: 'Re-open (will ask permission)',
          onClick: () => reopen(r),
        }, [r.name]))),
    ]);
    welcome.append(list);
  } catch {}
}

async function reopen(rec) {
  try {
    if (!await storage.ensurePermission(rec.handle, 'read')) return toast('Permission denied', 'warn');
    await ensurePdfLib();
    const file = await rec.handle.getFile();
    const bytes = new Uint8Array(await file.arrayBuffer());
    await openBytes(bytes, file.name, rec.handle);
    toast(`Opened ${file.name}`, 'ok');
  } catch (err) {
    emit('error', { message: 'Could not re-open', detail: err.message });
  }
}

function wireGlobalDrop() {
  const app = document.getElementById('app');
  const dropEl = () => welcome.querySelector('.drop');
  app.addEventListener('dragover', (e) => { e.preventDefault(); dropEl()?.classList.add('over'); });
  app.addEventListener('dragleave', (e) => { if (e.target === app) dropEl()?.classList.remove('over'); });
  app.addEventListener('drop', async (e) => {
    e.preventDefault(); dropEl()?.classList.remove('over');
    const file = [...(e.dataTransfer?.files || [])].find(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
    if (!file) return;
    try {
      await ensurePdfLib();
      const bytes = new Uint8Array(await file.arrayBuffer());
      await openBytes(bytes, file.name, null);
      toast(`Opened ${file.name}`, 'ok');
    } catch (err) { emit('error', { message: 'Could not open dropped file', detail: err.message }); }
  });
}

return { initWelcome };
})();

/* app.js */
const __m_app = (() => {
// app.js — bootstrap. Probe → prefs → error net → register ops → init UI → wire the
// keyboard grammar + agent face → URL mode. The deterministic core is already proven
// headlessly (test/m0-replay.mjs); this wires the human face on top of it.

const setEnginesBase = __m_core_engines.setEnginesBase;
const loadPrefs = __m_core_state.loadPrefs;
const state = __m_core_state.state;
const on = __m_core_events.on;
const registerOps = __m_ops_index.registerOps;
const keyboard = __m_core_keyboard.keyboard;
const undo = __m_core_runner.undo;
const redo = __m_core_runner.redo;
const refreshAgentFace = __m_core_agent.refreshAgentFace;
const handleUrlMode = __m_core_agent.handleUrlMode;

const installErrorNet = __m_ui_toast.installErrorNet;
const initToolbar = __m_ui_toolbar.initToolbar;
const initStatusbar = __m_ui_statusbar.initStatusbar;
const initRenderDoc = __m_ui_rendoc.initRenderDoc;
const initViewer = __m_ui_viewer.initViewer;
const zoomBy = __m_ui_viewer.zoomBy;
const setFitMode = __m_ui_viewer.setFitMode;
const scrollToPage = __m_ui_viewer.scrollToPage;
const initThumbs = __m_ui_thumbs.initThumbs;
const initAnnotateTools = __m_ui_annotate_tools.initAnnotateTools;
const setTool = __m_ui_annotate_tools.setTool;
const initWelcome = __m_ui_welcome.initWelcome;
const openPdf = __m_ui_fileops.openPdf;
const savePdf = __m_ui_fileops.savePdf;
const savePdfAs = __m_ui_fileops.savePdfAs;
const openHelp = __m_ui_help.openHelp;

function probe() {
  const ok = typeof crypto !== 'undefined' && crypto.subtle && 'indexedDB' in window;
  if (!ok) document.getElementById('compat')?.classList.add('show');
  return ok;
}

function wireKeyboard() {
  let modalOpen = false;
  on('modal:open', () => { modalOpen = true; });
  on('modal:close', () => { modalOpen = false; });
  keyboard.setContextResolver(() => modalOpen ? ['__modal__'] : (state.doc ? ['viewer'] : ['global']));

  keyboard
    .register('mod+o', () => openPdf(), { context: 'global', label: 'Open' })
    .register('mod+s', () => savePdf(), { context: 'global', label: 'Save' })
    .register('mod+shift+s', () => savePdfAs(), { context: 'global', label: 'Save as' })
    .register('mod+z', () => undo(), { context: 'global', label: 'Undo' })
    .register('mod+shift+z', () => redo(), { context: 'global', label: 'Redo' })
    .register('?', () => openHelp(), { context: 'global', label: 'Help' })
    .register('+', () => zoomBy(1.2), { context: 'viewer', label: 'Zoom in' })
    .register('=', () => zoomBy(1.2), { context: 'viewer' })
    .register('-', () => zoomBy(1 / 1.2), { context: 'viewer', label: 'Zoom out' })
    .register('0', () => setFitMode('width'), { context: 'viewer', label: 'Fit width' })
    .register('arrowdown', () => scrollToPage(Math.min(state.view.pageIndex + 1, state.doc.pageCount() - 1)), { context: 'viewer' })
    .register('arrowup', () => scrollToPage(Math.max(state.view.pageIndex - 1, 0)), { context: 'viewer' })
    // Annotation tools (bare keys, viewer context, suppressed while typing).
    .register('v', () => setTool(null), { context: 'viewer', label: 'Select' })
    .register('h', () => setTool('highlight'), { context: 'viewer', label: 'Highlight' })
    .register('r', () => setTool('rect'), { context: 'viewer', label: 'Rectangle' })
    .register('l', () => setTool('line'), { context: 'viewer', label: 'Line' })
    .register('d', () => setTool('pencil'), { context: 'viewer', label: 'Draw' })
    .register('t', () => setTool('text'), { context: 'viewer', label: 'Text box' })
    .register('escape', () => setTool(null), { context: 'viewer' })
    .attach(window);
}

function wireLoadingBar() {
  const bar = document.getElementById('loading-bar');
  on('loading', ({ on: active }) => {
    if (!bar) return;
    if (active) { bar.style.width = '70%'; }
    else { bar.style.width = '100%'; setTimeout(() => { bar.style.width = '0'; }, 220); }
  });
}

function boot() {
  if (!probe()) return;
  // Engines live one level up from /src in dev; the build rewrites this to './engines'.
  setEnginesBase('./engines');
  loadPrefs();
  if (!document.documentElement.getAttribute('data-theme')) document.documentElement.setAttribute('data-theme', 'dark');
  installErrorNet();
  wireLoadingBar();

  registerOps();

  initRenderDoc();
  initViewer();
  initThumbs();
  initAnnotateTools();
  initStatusbar();
  initToolbar();
  initWelcome();

  wireKeyboard();
  refreshAgentFace();
  handleUrlMode();

  console.log('[sheaf] ready —', document.getElementById('app').dataset.version);
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
else boot();

return {  };
})();
</script>
</body>
